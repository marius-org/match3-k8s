apiVersion: apps/v1
kind: Deployment
metadata:
  name: match3
  namespace: match3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: match3
  template:
    metadata:
      labels:
        app: match3
    spec:
      containers:
      - name: match3
        image: mariuseu/match3-k8s:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: match3-db-secret
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: match3-db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: match3-db-secret
              key: DB_PASSWORD
